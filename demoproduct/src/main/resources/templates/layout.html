<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Manager</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --accent:      #6366f1;
            --accent-dark: #4f46e5;
            --bg:          #f4f5fa;
            --card:        #ffffff;
            --text:        #111827;
            --muted:       #6b7280;
            --border:      #e5e7eb;
            --nav-bg:      #18181b;
            --nav-w:       230px;
            --radius:      12px;
            --shadow:      0 1px 3px rgba(0,0,0,0.06);
            --transition:  0.16s ease;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            font-size: 14.5px;
        }

        /* ── SIDEBAR ── */
        .sf-sidebar {
            width: var(--nav-w);
            background: var(--nav-bg);
            position: fixed; top: 0; left: 0;
            height: 100vh;
            display: flex; flex-direction: column;
            z-index: 200;
        }
        .sf-sidebar::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #a78bfa);
        }
        .sidebar-logo {
            padding: 24px 18px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .sidebar-logo a {
            display: flex; align-items: center; gap: 9px; text-decoration: none;
        }
        .logo-mark {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 15px; flex-shrink: 0;
        }
        .logo-name {
            font-family: 'Syne', sans-serif;
            font-weight: 700; font-size: 15px; color: #fff; letter-spacing: -0.2px;
        }
        .sidebar-nav {
            flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px;
        }
        .nav-section-label {
            font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
            text-transform: uppercase; color: rgba(255,255,255,0.22);
            padding: 12px 10px 5px;
        }
        .sidebar-link {
            display: flex; align-items: center; gap: 9px;
            padding: 9px 11px; border-radius: 7px;
            color: rgba(255,255,255,0.5); text-decoration: none;
            font-size: 13.5px; font-weight: 500;
            transition: all var(--transition);
        }
        .sidebar-link:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.9); }
        .sidebar-link.active { background: rgba(99,102,241,0.18); color: #a5b4fc; }
        .sidebar-link i { font-size: 15px; width: 16px; text-align: center; flex-shrink: 0; }
        .sidebar-footer {
            padding: 12px 18px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 11px; color: rgba(255,255,255,0.18);
        }

        /* ── MAIN ── */
        .sf-main { margin-left: var(--nav-w); flex: 1; display: flex; flex-direction: column; }

        /* ── TOPBAR ── */
        .sf-topbar {
            height: 56px; background: white; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 24px; gap: 8px;
            position: sticky; top: 0; z-index: 100;
        }
        .topbar-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 700; font-size: 15px; color: var(--text);
            text-decoration: none; margin-right: auto;
        }
        .topbar-brand:hover { color: var(--accent); }
        .topbar-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 13px; border-radius: 7px; font-size: 13px; font-weight: 500;
            text-decoration: none; border: none; cursor: pointer;
            font-family: 'DM Sans', sans-serif; transition: all var(--transition);
        }
        .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--bg); color: var(--text); }
        .btn-accent { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(99,102,241,0.28); }
        .btn-accent:hover { background: var(--accent-dark); color: white; }
        .btn-cart {
            background: #fefce8; color: #854d0e; border: 1px solid #fde68a;
            position: relative;
        }
        .btn-cart:hover { background: #fef9c3; }

        /* ── CONTENT ── */
        .sf-content { flex: 1; padding: 26px 28px; }

        /* ── SHARED CARD ── */
        .sf-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow);
        }

        /* ── TABLE ── */
        .sf-table { width: 100%; border-collapse: collapse; }
        .sf-table thead th {
            padding: 10px 16px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.6px;
            color: var(--muted); background: #f9fafb;
            border-bottom: 1px solid var(--border);
        }
        .sf-table tbody td {
            padding: 13px 16px; border-bottom: 1px solid #f3f4f6; vertical-align: middle;
        }
        .sf-table tbody tr:last-child td { border-bottom: none; }
        .sf-table tbody tr:hover { background: #fafbff; }

        /* ── FORM ── */
        .sf-input, .sf-select {
            display: block; width: 100%;
            padding: 10px 13px;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-family: 'DM Sans', sans-serif; font-size: 14px;
            color: var(--text); background: white;
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }
        .sf-input:focus, .sf-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .sf-input::placeholder { color: #9ca3af; }
        .sf-label { display: block; font-size: 12.5px; font-weight: 600; color: #374151; margin-bottom: 5px; }

        /* ── ACTION BUTTONS ── */
        .btn-edit {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 11px; border-radius: 7px; font-size: 12.5px; font-weight: 500;
            background: #fefce8; color: #92400e; border: 1px solid #fde68a;
            text-decoration: none; transition: all var(--transition);
        }
        .btn-edit:hover { background: #fef3c7; color: #78350f; }
        .btn-delete {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 11px; border-radius: 7px; font-size: 12.5px; font-weight: 500;
            background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
            text-decoration: none; transition: all var(--transition);
        }
        .btn-delete:hover { background: #fee2e2; color: #b91c1c; }

        /* ── PAGINATION ── */
        .sf-pagination { display: flex; gap: 3px; list-style: none; padding: 0; margin: 0; }
        .sf-pagination .page-link {
            display: flex; align-items: center; justify-content: center;
            min-width: 34px; height: 34px; padding: 0 6px;
            border-radius: 7px; border: 1px solid var(--border);
            background: white; color: var(--muted);
            font-size: 13px; font-weight: 500; text-decoration: none;
            transition: all var(--transition);
        }
        .sf-pagination .page-link:hover { border-color: var(--accent); color: var(--accent); background: #eef2ff; }
        .sf-pagination .page-item.active .page-link { background: var(--accent); border-color: var(--accent); color: white; }
        .sf-pagination .page-item.disabled .page-link { opacity: 0.38; pointer-events: none; }

        /* ── MISC ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        .animate-page { animation: fadeUp 0.28s ease both; }
        .pop-animation { animation: pop 0.3s ease-in-out; }

        @media (max-width: 768px) {
            .sf-sidebar { display: none; }
            .sf-main { margin-left: 0; }
            .sf-content { padding: 16px; }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sf-sidebar">
    <div class="sidebar-logo">
        <a th:href="@{/products}">
            <div class="logo-mark"><i class="bi bi-box-seam-fill"></i></div>
            <span class="logo-name">Product Manager</span>
        </a>
    </div>
    <nav class="sidebar-nav">
        <span class="nav-section-label">Navigation</span>
        <a class="sidebar-link" th:href="@{/products}">
            <i class="bi bi-house-door"></i> Home
        </a>
        <a class="sidebar-link" th:href="@{/products/add}">
            <i class="bi bi-plus-square"></i> Add Product
        </a>
        <a class="sidebar-link" th:href="@{/cart}">
            <i class="bi bi-cart3"></i> Cart
        </a>
    </nav>
    <div class="sidebar-footer">&copy; 2025 Phát triển ứng dụng với J2EE</div>
</aside>

<!-- MAIN -->
<div class="sf-main">

    <!-- Topbar — giữ nguyên logic href gốc -->
    <header class="sf-topbar">
        <a class="topbar-brand" th:href="@{/products}">
            <i class="bi bi-box-seam me-2"></i>Product Manager
        </a>

        <a class="topbar-btn btn-ghost" th:href="@{/products}">
            <i class="bi bi-house-door"></i> Home
        </a>
        <a class="topbar-btn btn-accent" th:href="@{/products/add}">
            <i class="bi bi-plus-lg"></i> Add Product
        </a>

        <!-- Giữ nguyên logic badge từ session.cart -->
        <a class="topbar-btn btn-cart" th:href="@{/cart}">
            <i class="bi bi-cart3"></i> Cart
            <span id="cart-badge"
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                  th:text="${session.cart != null ? #aggregates.sum(session.cart.![quantity]) : '0'}">
                0
            </span>
        </a>
    </header>

    <!-- Content -->
    <main class="sf-content animate-page">
        <div layout:fragment="content"></div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Giữ nguyên logic AJAX add-to-cart gốc
        const addToCartForms = document.querySelectorAll('form[action="/cart/add"]');

        addToCartForms.forEach(form => {
            form.addEventListener("submit", function (e) {
                e.preventDefault();

                const formData = new FormData(this);

                fetch(this.action, {
                    method: "POST",
                    body: formData
                })
                .then(response => {
                    if (response.ok) return response.text();
                    throw new Error("Lỗi khi thêm vào giỏ hàng");
                })
                .then(data => {
                    const badge = document.getElementById("cart-badge");
                    badge.innerText = data;
                    badge.classList.add("pop-animation");
                    setTimeout(() => badge.classList.remove("pop-animation"), 300);
                })
                .catch(error => console.error("Error:", error));
            });
        });

        // Active sidebar
        const path = window.location.pathname;
        document.querySelectorAll('.sidebar-link').forEach(link => {
            if (link.getAttribute('href') === path) link.classList.add('active');
        });
    });
</script>
</body>
</html>
