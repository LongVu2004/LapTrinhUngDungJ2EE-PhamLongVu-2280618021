<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">

    <!-- Style phải nằm TRONG fragment để Thymeleaf inject đúng -->
    <style>
        @keyframes scaleIn {
            0%   { transform: scale(0.5); opacity: 0; }
            70%  { transform: scale(1.08); }
            100% { transform: scale(1);   opacity: 1; }
        }
        @keyframes ringPulse {
            0%   { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.9); opacity: 0; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            width: 76px; height: 76px;
            background: linear-gradient(135deg, #34d399, #10b981);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white;
            position: relative; z-index: 1;
            animation: scaleIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
            box-shadow: 0 8px 24px rgba(52,211,153,0.38);
        }
        .success-ring {
            position: absolute; inset: -10px;
            border-radius: 50%;
            border: 2.5px solid #34d399;
            animation: ringPulse 1.1s ease-out 0.55s both;
        }
        .slide-1 { animation: slideUp 0.35s 0.25s ease both; }
        .slide-2 { animation: slideUp 0.35s 0.38s ease both; }
        .slide-3 { animation: slideUp 0.35s 0.50s ease both; }
        .slide-4 { animation: slideUp 0.35s 0.62s ease both; }
    </style>

    <div style="max-width:500px; margin:32px auto 0;">
        <div class="sf-card" style="padding:48px 36px; text-align:center; position:relative; overflow:hidden;">

            <!-- Decorative background glow -->
            <div style="position:absolute; top:-50px; right:-50px; width:180px; height:180px;
                        background:radial-gradient(circle, rgba(52,211,153,0.1) 0%, transparent 70%);
                        pointer-events:none;"></div>

            <!-- Success icon -->
            <div style="position:relative; display:inline-block; margin-bottom:24px;">
                <div class="success-ring"></div>
                <div class="success-icon">
                    <i class="bi bi-check-lg"></i>
                </div>
            </div>

            <!-- Title -->
            <h2 class="slide-1"
                style="font-family:'Syne',sans-serif; font-weight:800; font-size:26px;
                       letter-spacing:-0.4px; color:var(--text); margin-bottom:8px;">
                ĐẶT HÀNG THÀNH CÔNG!
            </h2>

            <!-- Order ID — giữ nguyên inline expression gốc -->
            <p class="slide-2"
               style="font-size:15px; color:var(--muted); margin-bottom:24px;">
                Cảm ơn bạn đã mua hàng. Mã đơn hàng của bạn là:
                <strong style="color:var(--text);">#[[${order.id}]]</strong>
            </p>

            <!-- Total amount — giữ nguyên th:text gốc -->
            <div class="slide-3"
                 style="background:#f4f5fa; border-radius:10px; padding:18px 22px; margin-bottom:28px;">
                <span style="font-size:13px; color:var(--muted); display:block; margin-bottom:4px;">Tổng thanh toán</span>
                <span style="font-family:'Syne',sans-serif; font-weight:800; font-size:26px; color:var(--accent);"
                      th:text="${order.totalAmount} + ' đ'"></span>
            </div>

            <!-- CTA -->
            <div class="slide-4">
                <a th:href="@{/products}"
                   class="topbar-btn btn-accent"
                   style="font-size:14px; padding:10px 24px;">
                    <i class="bi bi-bag me-1"></i> Tiếp tục mua sắm
                </a>
            </div>

        </div>
    </div>

</div>
</html>
