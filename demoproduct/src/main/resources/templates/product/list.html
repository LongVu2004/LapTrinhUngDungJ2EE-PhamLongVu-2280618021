<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">

    <!-- Page heading -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <p style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;">Inventory</p>
            <h1 style="font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-0.4px;margin:0;">Product List</h1>
        </div>
        <a th:href="@{/products/add}" class="topbar-btn btn-accent">
            <i class="bi bi-plus-lg"></i> New Product
        </a>
    </div>

    <!-- Filter bar — giữ nguyên toàn bộ logic gốc -->
    <div class="sf-card mb-4" style="padding:14px 18px;">
        <div class="row align-items-center g-2">
            <div class="col-md-8">
                <form th:action="@{/products}" method="get" class="d-flex align-items-center gap-2">

                    <!-- Dropdown category — giữ nguyên logic gốc -->
                    <div class="dropdown">
                        <button class="topbar-btn btn-ghost dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-tag"></i> Danh mục
                        </button>
                        <ul class="dropdown-menu shadow-sm" style="border-radius:10px;border:1px solid var(--border);padding:6px;font-size:14px;">
                            <li><a class="dropdown-item rounded-2" th:href="@{/products}">Tất cả sản phẩm</a></li>
                            <li><hr class="dropdown-divider my-1"></li>
                            <li th:each="cat : ${categories}">
                                <a class="dropdown-item rounded-2"
                                   th:href="@{/products(categoryId=${cat.id})}"
                                   th:text="${cat.name}"></a>
                            </li>
                        </ul>
                    </div>

                    <!-- Search input — giữ nguyên name/value gốc -->
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="sf-input" style="max-width:260px;"
                           placeholder="Nhập tên sản phẩm cần tìm...">

                    <button type="submit" class="topbar-btn btn-accent">Tìm kiếm</button>
                    <a th:href="@{/products}" class="topbar-btn btn-ghost">Reset</a>
                </form>
            </div>

            <!-- Sort buttons — giữ nguyên logic href gốc -->
            <div class="col-md-4 text-end d-flex justify-content-end gap-2">
                <a th:href="@{/products(page=1, keyword=${keyword}, sortField='price', sortDir='asc', categoryId=${selectedCatId})}"
                   class="topbar-btn btn-ghost" style="font-size:12.5px;">
                    <i class="bi bi-sort-numeric-up"></i> Giá ↑
                </a>
                <a th:href="@{/products(page=1, keyword=${keyword}, sortField='price', sortDir='desc', categoryId=${selectedCatId})}"
                   class="topbar-btn btn-ghost" style="font-size:12.5px;">
                    <i class="bi bi-sort-numeric-down"></i> Giá ↓
                </a>
            </div>
        </div>
    </div>

    <!-- Empty state — giữ nguyên logic th:if gốc -->
    <div th:if="${#lists.isEmpty(products)}" class="sf-card text-center" style="padding:56px 24px;">
        <i class="bi bi-inbox" style="font-size:3rem;color:var(--border);display:block;margin-bottom:12px;"></i>
        <p style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;">Không tìm thấy sản phẩm nào phù hợp!</p>
        <a th:href="@{/products}" class="topbar-btn btn-ghost mt-3 d-inline-flex">Xem tất cả</a>
    </div>

    <!-- Table — giữ nguyên toàn bộ logic th:each, th:text, th:href, th:src gốc -->
    <div class="sf-card" style="overflow:hidden;">
        <table class="sf-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Image</th>
                    <th>Price</th>
                    <th>Category</th>
                    <th class="text-center">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td>
                        <span style="font-size:12px;font-weight:600;color:var(--muted);">
                            #<span th:text="${product.id}"></span>
                        </span>
                    </td>
                    <td>
                        <span style="font-weight:600;" th:text="${product.name}"></span>
                    </td>
                    <td>
                        <!-- Giữ nguyên th:src gốc -->
                        <img th:src="${product.image}"
                             style="width:52px;height:52px;object-fit:cover;border-radius:9px;border:1px solid var(--border);">
                    </td>
                    <td>
                        <!-- Giữ nguyên th:text gốc -->
                        <span style="font-weight:700;color:#059669;" th:text="${product.price}"></span>
                    </td>
                    <td>
                        <!-- Giữ nguyên logic ternary gốc -->
                        <span th:if="${product.category != null}"
                              style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;background:#eef2ff;color:#4338ca;"
                              th:text="${product.category.name}"></span>
                        <span th:if="${product.category == null}" style="color:var(--border);">—</span>
                    </td>

                    <td class="text-center">
                        <div class="d-flex align-items-center justify-content-center gap-2">

                            <!-- Edit — giữ nguyên href gốc -->
                            <a th:href="@{/products/edit/{id}(id=${product.id})}"
                               class="btn-edit" title="Sửa">
                                <i class="bi bi-pencil"></i>
                            </a>

                            <!-- Delete — giữ nguyên href + onclick gốc -->
                            <a th:href="@{/products/delete/{id}(id=${product.id})}"
                               class="btn-delete" title="Xóa"
                               onclick="return confirm('Delete this product?')">
                                <i class="bi bi-trash"></i>
                            </a>

                            <!-- Add to cart — giữ nguyên toàn bộ form gốc -->
                            <form th:action="@{/cart/add}" method="post" class="d-inline-flex align-items-center gap-1">
                                <input type="hidden" name="productId" th:value="${product.id}">
                                <div class="input-group input-group-sm" style="width:110px;">
                                    <input type="number" name="quantity" value="1" min="1"
                                           class="form-control text-center"
                                           style="border-radius:7px 0 0 7px;border:1.5px solid var(--border);font-size:13px;">
                                    <button type="submit"
                                            class="btn btn-sm"
                                            style="background:#f0fdf4;color:#16a34a;border:1.5px solid #bbf7d0;border-left:none;border-radius:0 7px 7px 0;"
                                            title="Thêm vào giỏ">
                                        <i class="bi bi-cart-plus"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Pagination — giữ nguyên toàn bộ logic gốc -->
        <div th:if="${totalPages > 1}"
             style="padding:14px 18px;border-top:1px solid var(--border);display:flex;justify-content:center;background:#fafbff;">
            <ul class="sf-pagination">
                <!-- Previous — giữ nguyên logic disabled gốc -->
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, categoryId=${selectedCatId})}">
                        <i class="bi bi-chevron-left" style="font-size:11px;"></i>
                    </a>
                </li>

                <!-- Pages — giữ nguyên logic th:each và th:classappend gốc -->
                <li th:each="i : ${#numbers.sequence(1, totalPages)}"
                    class="page-item" th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link"
                       th:href="@{/products(page=${i}, keyword=${keyword}, categoryId=${selectedCatId})}"
                       th:text="${i}"></a>
                </li>

                <!-- Next — giữ nguyên logic gốc -->
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, sortField=${sortField}, sortDir=${sortDir}, categoryId=${selectedCatId})}">
                        <i class="bi bi-chevron-right" style="font-size:11px;"></i>
                    </a>
                </li>
            </ul>
        </div>
    </div>

</div>
</html>
