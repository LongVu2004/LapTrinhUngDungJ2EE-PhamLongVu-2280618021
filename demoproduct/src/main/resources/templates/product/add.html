<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">

    <!-- Back link -->
    <a th:href="@{/products}"
       style="display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);text-decoration:none;margin-bottom:18px;transition:color 0.15s;"
       onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">
        <i class="bi bi-arrow-left"></i> Back to Products
    </a>

    <div style="display:grid;grid-template-columns:1fr 320px;gap:22px;align-items:start;max-width:900px;">

        <!-- Form card -->
        <div class="sf-card" style="padding:28px;">
            <div style="margin-bottom:22px;">
                <p style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;">Inventory</p>
                <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-0.3px;margin:0;">
                    <i class="bi bi-plus-circle me-2" style="color:var(--accent);"></i>Add New Product
                </h2>
            </div>

            <!-- Giữ nguyên action, th:object, method gốc -->
            <form th:action="@{/products/save}" th:object="${product}" method="post">

                <div style="margin-bottom:18px;">
                    <label class="sf-label" for="name">Product Name</label>
                    <!-- Giữ nguyên th:field gốc -->
                    <input type="text" th:field="*{name}" class="sf-input" id="name" placeholder="Tên sản phẩm">
                </div>

                <div style="margin-bottom:18px;">
                    <label class="sf-label" for="imageUrl">Image URL</label>
                    <!-- Giữ nguyên th:field gốc -->
                    <input type="text" th:field="*{image}" class="sf-input" id="imageUrl" placeholder="https://...">
                </div>

                <!-- Giữ nguyên logic th:if preview gốc -->
                <div class="mb-4 text-center" style="display:none;">
                    <img id="preview" th:if="${product.image}" th:src="${product.image}"
                         class="img-preview" style="max-height: 220px; max-width: 100%; display: none;">
                </div>

                <div style="margin-bottom:18px;">
                    <label class="sf-label" for="price">Price (VND)</label>
                    <!-- Giữ nguyên th:field gốc -->
                    <input type="number" th:field="*{price}" class="sf-input" id="price" placeholder="0">
                </div>

                <div style="margin-bottom:24px;">
                    <label class="sf-label" for="category">Category</label>
                    <!-- Giữ nguyên th:field và th:each gốc -->
                    <select th:field="*{category.id}" class="sf-select" id="category">
                        <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                    </select>
                </div>

                <div style="display:flex;justify-content:flex-end;gap:10px;padding-top:18px;border-top:1px solid var(--border);">
                    <a th:href="@{/products}" class="topbar-btn btn-ghost">Cancel</a>
                    <button type="submit" class="topbar-btn btn-accent">
                        <i class="bi bi-save"></i> Save Product
                    </button>
                </div>
            </form>
        </div>

        <!-- Preview card -->
        <div class="sf-card" style="padding:18px;position:sticky;top:76px;">
            <p class="sf-label" style="margin-bottom:12px;">Image Preview</p>
            <div id="previewBox"
                 style="background:#f9fafb;border-radius:9px;border:2px dashed var(--border);height:200px;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:border-color 0.2s;">
                <div id="placeholder" style="text-align:center;color:#d1d5db;">
                    <i class="bi bi-image" style="font-size:2.2rem;display:block;margin-bottom:8px;"></i>
                    <span style="font-size:13px;">No image yet</span>
                </div>
                <img id="previewImg" src="" alt=""
                     style="width:100%;height:100%;object-fit:cover;display:none;border-radius:7px;">
            </div>
        </div>
    </div>
</div>

<!-- Giữ nguyên script preview gốc, chỉ mở rộng để sync với preview card -->
<script>
    document.getElementById('imageUrl').addEventListener('input', function() {
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');
        const placeholder = document.getElementById('placeholder');
        const box = document.getElementById('previewBox');

        if (this.value.trim()) {
            // Logic gốc
            if (preview) {
                preview.src = this.value;
                preview.style.display = 'block';
            }
            // Preview card
            previewImg.src = this.value;
            previewImg.style.display = 'block';
            placeholder.style.display = 'none';
            box.style.borderColor = 'var(--accent)';
            box.style.borderStyle = 'solid';
        } else {
            if (preview) preview.style.display = 'none';
            previewImg.style.display = 'none';
            placeholder.style.display = 'block';
            box.style.borderColor = 'var(--border)';
            box.style.borderStyle = 'dashed';
        }
    });
</script>
</html>
