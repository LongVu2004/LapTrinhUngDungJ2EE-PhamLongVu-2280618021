<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-6">
            <div class="card card-custom">
                <div class="card-header bg-white border-0 pt-4 pb-0">
                    <h3 class="text-center text-primary mb-0">
                        <i class="bi bi-plus-circle me-2"></i>Add New Product
                    </h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/products/save}" th:object="${product}" method="post">

                        <div class="form-floating mb-3">
                            <input type="text" th:field="*{name}" class="form-control" id="name" placeholder=" ">
                            <label for="name">Product Name</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" th:field="*{image}" class="form-control" id="imageUrl" placeholder=" ">
                            <label for="imageUrl">Image URL</label>
                        </div>

                        <!-- Live Preview -->
                        <div class="mb-4 text-center">
                            <img id="preview" th:if="${product.image}" th:src="${product.image}"
                                 class="img-preview" style="max-height: 220px; max-width: 100%; display: none;">
                        </div>

                        <div class="form-floating mb-3">
                            <input type="number" th:field="*{price}" class="form-control" id="price" placeholder=" ">
                            <label for="price">Price (VND)</label>
                        </div>

                        <div class="form-floating mb-4">
                            <select th:field="*{category.id}" class="form-select" id="category">
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                            </select>
                            <label for="category">Category</label>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/products}" class="btn btn-outline-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-primary px-5">
                                <i class="bi bi-save me-2"></i>Save Product
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('imageUrl').addEventListener('input', function() {
        const preview = document.getElementById('preview');
        if (this.value.trim()) {
            preview.src = this.value;
            preview.style.display = 'block';
        } else {
            preview.style.display = 'none';
        }
    });
</script>
</html>
