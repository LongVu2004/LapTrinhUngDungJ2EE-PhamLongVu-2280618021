<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-6">
            <div class="card card-custom">
                <div class="card-header bg-white border-0 pt-4 pb-0">
                    <h3 class="text-center text-warning mb-0">
                        <i class="bi bi-pencil-square me-2"></i>Edit Product
                    </h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/products/update/{id}(id=${product.id})}" th:object="${product}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <div class="form-floating mb-3">
                            <input type="text" th:field="*{name}" class="form-control" id="name">
                            <label for="name">Product Name</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" th:field="*{image}" class="form-control" id="imageUrl">
                            <label for="imageUrl">Image URL</label>
                        </div>

                        <!-- Preview -->
                        <div class="mb-4 text-center bg-light p-3 rounded-4">
                            <img id="preview" th:src="*{image}" th:if="*{image}"
                                 class="img-preview" style="max-height: 260px;">
                        </div>

                        <div class="form-floating mb-3">
                            <input type="number" th:field="*{price}" class="form-control" id="price">
                            <label for="price">Price (VND)</label>
                        </div>

                        <div class="form-floating mb-4">
                            <select th:field="*{category.id}" class="form-select" id="category">
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                            </select>
                            <label for="category">Category</label>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/products}" class="btn btn-outline-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-warning px-5 text-white">
                                <i class="bi bi-arrow-clockwise me-2"></i>Update
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('imageUrl').addEventListener('input', function() {
        document.getElementById('preview').src = this.value;
    });
</script>
</html>
