<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Thêm học phần</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .form-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 25px;
            max-width: 600px;
            margin: auto;
        }
    </style>

</head>

<body>

    <div class="container mt-5">

        <div class="form-card">

            <h3 class="mb-4 text-center">
                Thêm học phần
            </h3>

            <form th:action="@{/admin/courses/save}" th:object="${course}" method="post">

                <div class="mb-3">

                    <label class="form-label">Tên học phần</label>

                    <input type="text" th:field="*{name}" class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">Hình ảnh (URL)</label>

                    <input type="text" th:field="*{image}" class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">Số tín chỉ</label>

                    <input type="number" th:field="*{credits}" class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">Giảng viên</label>

                    <input type="text" th:field="*{lecturer}" class="form-control">

                </div>

                <div class="text-center">

                    <button class="btn btn-primary me-2">
                        Lưu
                    </button>

                    <a href="/admin/courses" class="btn btn-secondary">
                        Quay lại
                    </a>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
