<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Thêm học phần</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2>Thêm học phần</h2>

<form th:action="@{/admin/courses/save}" th:object="${course}" method="post">

<div class="mb-3">
<label>Tên học phần</label>
<input type="text" th:field="*{name}" class="form-control">
</div>

<div class="mb-3">
<label>Hình ảnh</label>
<input type="text" th:field="*{image}" class="form-control">
</div>

<div class="mb-3">
<label>Số tín chỉ</label>
<input type="number" th:field="*{credits}" class="form-control">
</div>

<div class="mb-3">
<label>Giảng viên</label>
<input type="text" th:field="*{lecturer}" class="form-control">
</div>

<button class="btn btn-primary">
Lưu
</button>

</form>

</div>

</body>
</html>
