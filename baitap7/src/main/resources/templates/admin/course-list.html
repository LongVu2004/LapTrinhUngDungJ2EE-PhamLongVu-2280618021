<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Quản lý học phần</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .table-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
    </style>

</head>

<body>

    <div class="container mt-5">

        <div class="table-card">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h3 class="fw-bold">
                    Quản lý học phần
                </h3>

                <a class="btn btn-success" th:href="@{/admin/courses/create}">
                    + Thêm học phần
                </a>

            </div>

            <table class="table table-striped table-hover align-middle">

                <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Hình ảnh</th>
                        <th>Tên học phần</th>
                        <th>Tín chỉ</th>
                        <th>Giảng viên</th>
                        <th class="text-center">Thao tác</th>
                    </tr>

                </thead>

                <tbody>

                    <tr th:each="course : ${courses}">

                        <td th:text="${course.id}"></td>

                        <td>
                            <img th:src="${course.image}"
                                style="width:70px;height:50px;object-fit:cover;border-radius:6px">
                        </td>

                        <td th:text="${course.name}"></td>

                        <td th:text="${course.credits}"></td>

                        <td th:text="${course.lecturer}"></td>

                        <td class="text-center">

                            <a class="btn btn-warning btn-sm me-1"
                                th:href="@{/admin/courses/edit/{id}(id=${course.id})}">
                                Sửa
                            </a>

                            <a class="btn btn-danger btn-sm" th:href="@{/admin/courses/delete/{id}(id=${course.id})}">
                                Xóa
                            </a>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>  

    </div>

</body>

</html>
