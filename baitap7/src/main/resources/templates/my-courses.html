<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Học phần của tôi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">
Học phần của tôi
</h2>

<div class="row">

<div class="col-md-4 mb-4"
     th:each="enroll : ${enrollments}">

<div class="card shadow">

<img th:src="${enroll.course.image}"
     class="card-img-top"
     style="height:200px;object-fit:cover">

<div class="card-body">

<h5 th:text="${enroll.course.name}"></h5>

<p>

<strong>Tín chỉ:</strong>
<span th:text="${enroll.course.credits}"></span>

<br>

<strong>Giảng viên:</strong>
<span th:text="${enroll.course.lecturer}"></span>

</p>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
