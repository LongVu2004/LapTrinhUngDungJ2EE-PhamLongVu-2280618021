<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Học phần của tôi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .course-card {
            border: none;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .course-img {
            height: 200px;
            object-fit: cover;
        }

        .course-title {
            font-size: 18px;
            font-weight: 600;
        }

        .course-info {
            font-size: 14px;
            color: #555;
        }
    </style>

</head>

<body class="bg-light">

    <div class="container mt-4">

        <h2 class="text-center mb-4 fw-bold">
            Học phần của tôi
        </h2>

        <div class="row g-4">

            <div class="col-md-4" th:each="enroll : ${enrollments}">
                <div class="card course-card">

                    <img th:src="${enroll.course.image}" class="card-img-top course-img">

                    <div class="card-body">

                        <h5 class="course-title" th:text="${enroll.course.name}">
                        </h5>

                        <p class="course-info">

                            🎓 <strong>Tín chỉ:</strong>
                            <span th:text="${enroll.course.credits}"></span>

                            <br>

                            👨‍🏫 <strong>Giảng viên:</strong>
                            <span th:text="${enroll.course.lecturer}"></span>

                        </p>

                    </div>

                </div>

            </div>
            <div th:if="${#lists.isEmpty(enrollments)}" class="text-center mt-5">

                <h4>Bạn chưa đăng ký học phần nào</h4>

                <a href="/home" class="btn btn-primary mt-3">
                    Xem danh sách học phần
                </a>

            </div>

        </div>

    </div>

</body>

</html>
