<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Đăng ký</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            width: 420px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            background: white;
            border: none;
            padding-top: 25px;
        }

        .form-control {
            border-radius: 10px;
            padding-left: 40px;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 12px;
            top: 10px;
            color: #999;
        }

        .btn-register {
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
        }
    </style>

</head>

<body>

    <div class="card register-card">

        <div class="card-header text-center">

            <h4 class="fw-bold">
                Đăng ký tài khoản
            </h4>

            <p class="text-muted small">
                Student Registration
            </p>

        </div>

        <div class="card-body px-4 pb-4">

            <form th:action="@{/register}" th:object="${student}" method="post">

                <div class="mb-3 input-icon">

                    <i class="fa fa-user"></i>

                    <input type="text" th:field="*{username}" class="form-control" placeholder="Tên đăng nhập" required>

                </div>

                <div class="mb-3 input-icon">

                    <i class="fa fa-lock"></i>

                    <input type="password" th:field="*{password}" class="form-control" placeholder="Mật khẩu" required>

                </div>

                <div class="mb-3 input-icon">

                    <i class="fa fa-envelope"></i>

                    <input type="email" th:field="*{email}" class="form-control" placeholder="Email" required>

                </div>

                <button class="btn btn-success w-100 btn-register">
                    Đăng ký
                </button>

                <div class="text-center mt-3">

                    <span class="text-muted">
                        Đã có tài khoản?
                    </span>

                    <a href="/login">
                        Đăng nhập
                    </a>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
