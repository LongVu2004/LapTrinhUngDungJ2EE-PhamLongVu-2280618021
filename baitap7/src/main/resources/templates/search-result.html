<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Kết quả tìm kiếm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div class="container mt-4">

        <h2 class="text-center mb-4">
            Kết quả tìm kiếm
        </h2>

        <div class="row">

            <div class="col-md-4 mb-4" th:each="course : ${courses}">

                <div class="card shadow">

                    <img th:src="${course.image}" class="card-img-top" style="height:200px;object-fit:cover">

                    <div class="card-body">

                        <h5 th:text="${course.name}"></h5>

                        <p>

                            <strong>Số tín chỉ:</strong>
                            <span th:text="${course.credits}"></span>

                            <br>

                            <strong>Giảng viên:</strong>
                            <span th:text="${course.lecturer}"></span>

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
