<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Manager</title>

    <!-- Bootstrap 5.3 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #6366f1;
        }
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .navbar {
            background: #4f46e5 !important;
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.3);
        }
        .card-custom {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-custom:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15);
        }
        .form-floating > label {
            color: #64748b;
        }
        .table thead {
            background: #4f46e5;
            color: white;
        }
        .img-preview {
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        footer {
            background: white;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/products}">
                <i class="bi bi-box-seam me-2"></i> Product Manager
            </a>
            <div class="ms-auto d-flex gap-2">
                <a class="btn btn-outline-light d-flex align-items-center gap-2" th:href="@{/products}">
                    <i class="bi bi-house-door"></i> Home
                </a>
                <a class="btn btn-light d-flex align-items-center gap-2 shadow-sm" th:href="@{/products/add}">
                    <i class="bi bi-plus-lg"></i> Add Product
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 flex-fill">
        <div layout:fragment="content"></div>
    </div>

    <footer class="text-center bg-white mt-auto py-3 shadow-sm">
        <p class="mb-0">&copy; 2025 Phát triển ứng dụng với J2EE</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
