<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">
    <div class="card card-custom">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="mb-0 fw-semibold text-dark">
                        <i class="bi bi-list-ul me-2"></i>Product List
                    </h3>
                </div>
                <a th:href="@{/products/add}" class="btn btn-primary shadow-sm">
                    <i class="bi bi-plus-lg me-2"></i>New Product
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Image</th>
                            <th>Price</th>
                            <th>Category</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td class="fw-medium">#<span th:text="${product.id}"></span></td>
                            <td th:text="${product.name}"></td>
                            <td>
                                <img th:src="${product.image}" class="rounded-3 shadow-sm"
                                     style="width: 70px; height: 70px; object-fit: cover;">
                            </td>
                            <td>
                                <span class="fw-bold text-success" th:text="${product.price}"></span>
                            </td>
                            <td th:text="${product.category != null ? product.category.name : '—'}"></td>
                            <td class="text-center">
                                <a th:href="@{/products/edit/{id}(id=${product.id})}"
                                   class="btn btn-sm btn-outline-warning me-2">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/products/delete/{id}(id=${product.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Delete this product?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</html>
